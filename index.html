<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colorfly Studio</title>
    <link rel="reset stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="./js/scripts.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zalando+Sans+SemiExpanded:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./assets/fav-iconColorfly.png" type="image/png" />
  </head>
  <body>
    <header class="header">
      <div class="header-container">
        <a href="/" class="logo-container">
          <img
            src="./assets/logo_ColorFly.png"
            alt="Colorfly Studio logo"
            class="logo"
          />
          <h1 class="logo-text">Colorfly Studio</h1>
        </a>
      </div>
    </header>

    <div class="controls">
      <button class="btn-generate">Generar Paleta</button>

      <select name="cantidad" class="btn-select">
        <option value="" selected disabled>Cantidad de colores</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
      </select>
    </div>

    <div class="controles-paleta">

      <button id="guardadoPaleta">Guardar</button>

      <select id="listaPaletas">
        <option value="">Paletas guardadas</option>
      </select>

      <button id="cargaPaleta">Cargar</button>

    </div>

    <main class="palette"></main>

    <footer class="footer">
      <div class="footer-container">
        <div class="footer-brand">
          <img
            src="./assets/logo_ColorFly.png"
            alt="Colorfly Studio logo"
            class="footer-logo"
          />
          <span class="footer-text">Colorfly Studio</span>
        </div>

        <p class="footer-copy">
          © 2026 Colorfly Studio. Todos los derechos reservados.
        </p>
      </div>
    </footer>
  </body>
</html>

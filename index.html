<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palette</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="reset stylesheet" href="./css/reset.css" />
    <script src="./js/scripts.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zalando+Sans+SemiExpanded:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <div class="header-container">
        <a href="#" class="logo-container">
          <img
            src="./assets/logo_ColorFly.png"
            alt="Colorfly Studio logo"
            class="logo"
          />
          <h1 class="logo-text">Colorfly Studio</h1>
        </a>
      </div>
    </header>
    <div class="controls">
      <button class="btn-generate">Cambiar de color/es</button>

      <select name="cantidad" class="btn-select">
        <option value="" selected disabled>Cantidad de colores</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
      </select>
    </div>

    <main class="palette"></main>

    <footer class="footer">
      <div class="footer-container">
        <div class="footer-brand">
          <img
            src="./assets/logo_ColorFly.png"
            alt="Colorfly Studio logo"
            class="footer-logo"
          />
          <span class="footer-text">Colorfly Studio</span>
        </div>

        <p class="footer-copy">
          © 2026 Colorfly Studio. Todos los derechos reservados.
        </p>
      </div>
    </footer>
  </body>
</html>
